name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system libraries for PySide6 (headless)
        run: sudo apt-get update && sudo apt-get install -y libegl1 libxkbcommon0 libdbus-1-3

      - name: Install the package and dev tools
        run: python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest, Qt offscreen)
        run: pytest
        env:
          QT_QPA_PLATFORM: offscreen
